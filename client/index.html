<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSCAR — Onshape AI Copilot</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1e1e2e;
      --surface:     #2a2a3d;
      --surface2:    #313145;
      --border:      #3b3b55;
      --accent:      #238636;
      --accent-h:    #2ea043;
      --copilot:     #58a6ff;
      --text:        #e6edf3;
      --text-muted:  #8b949e;
      --user-bg:     #21262d;
      --ai-bg:       #161b22;
      --danger:      #f85149;
      --tag-bg:      #1f4068;
      --radius:      8px;
      --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --mono:        ui-monospace, "Cascadia Code", "Fira Code", monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Top bar ────────────────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .oscar-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 700;
      font-size: 15px;
      color: var(--copilot);
      white-space: nowrap;
    }

    .oscar-logo svg { flex-shrink: 0; }

    .topbar-sep { flex: 1; }

    /* ── Agent picker (GitHub Copilot style) ────────────────────────────── */
    .agent-picker-wrap {
      position: relative;
    }

    .agent-picker-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 5px 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      transition: border-color .15s;
      white-space: nowrap;
      max-width: 240px;
    }

    .agent-picker-btn:hover { border-color: var(--copilot); }

    .agent-picker-btn .agent-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-picker-btn .chevron {
      margin-left: 2px;
      flex-shrink: 0;
      transition: transform .2s;
    }

    .agent-picker-btn.open .chevron { transform: rotate(180deg); }

    /* Provider badge pill */
    .provider-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--copilot);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .provider-badge.copilot { background: #0d2137; color: var(--copilot); }
    .provider-badge.openai  { background: #0a2e1f; color: #3fb950; }
    .provider-badge.anthropic { background: #2d1b00; color: #e3b341; }

    /* Dropdown panel */
    .agent-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      z-index: 999;
      overflow: hidden;
    }

    .agent-dropdown.open { display: block; }

    .dropdown-header {
      padding: 10px 12px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .provider-group { padding: 4px 0; }

    .provider-label {
      padding: 6px 12px 2px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
    }

    .agent-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      transition: background .1s;
    }

    .agent-option:hover { background: var(--surface2); }
    .agent-option.selected { background: rgba(88, 166, 255, .08); }

    .agent-option-info { flex: 1; min-width: 0; }
    .agent-option-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-option-desc {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .check-icon { color: var(--copilot); flex-shrink: 0; }
    .check-icon.hidden { visibility: hidden; }

    .dropdown-footer {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      background: var(--ai-bg);
    }

    .dropdown-footer a { color: var(--copilot); text-decoration: none; }
    .dropdown-footer a:hover { text-decoration: underline; }

    /* ── Onshape context bar ────────────────────────────────────────────── */
    .context-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--ai-bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .context-bar .ctx-label { font-weight: 600; color: var(--text); }

    .ctx-field {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ctx-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 11px;
      font-family: var(--mono);
      padding: 2px 6px;
      width: 140px;
      outline: none;
      transition: border-color .15s;
    }

    .ctx-input-url {
      width: min(560px, 66vw);
      font-family: var(--font);
    }

    .ctx-input:focus { border-color: var(--copilot); }
    .ctx-input::placeholder { color: var(--text-muted); }

    .ctx-fetch-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      font-family: var(--font);
      transition: background .1s, border-color .1s;
    }

    .ctx-fetch-btn:hover { background: var(--border); border-color: var(--copilot); }

    .ctx-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .ctx-status.ok  { background: rgba(46,160,67,.15); color: #3fb950; }
    .ctx-status.err { background: rgba(248,81,73,.15);  color: var(--danger); }
    .ctx-status.loading { background: rgba(88,166,255,.1); color: var(--copilot); }

    /* ── Message list ───────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 100%;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .message-header .avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }

    .avatar.user  { background: var(--copilot); color: #0d1117; }
    .avatar.ai    { background: #6e40c9; color: #fff; }

    .message-body {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.ai .message-body {
      background: var(--ai-bg);
    }

    /* Code blocks inside AI responses */
    .message-body pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 12px;
      margin: 8px 0;
    }

    .message-body code {
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(110,64,201,.15);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .message-body pre code {
      background: none;
      padding: 0;
    }

    /* Action buttons on AI messages */
    .action-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .action-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 12px;
    }

    .action-item .action-type-badge {
      background: rgba(110,64,201,.2);
      color: #b392f0;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .4px;
      flex-shrink: 0;
    }

    .action-item .action-label { flex: 1; }

    .apply-btn {
      background: var(--accent);
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      font-family: var(--font);
      transition: background .15s;
      flex-shrink: 0;
    }

    .apply-btn:hover { background: var(--accent-h); }
    .apply-btn:disabled { opacity: .5; cursor: not-allowed; }
    .apply-btn.applied { background: #6e40c9; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 24px;
    }

    .empty-state svg { opacity: .3; }
    .empty-state h2 { font-size: 18px; color: var(--text); }
    .empty-state p  { font-size: 13px; max-width: 340px; }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 6px;
    }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      padding: 5px 12px;
      font-family: var(--font);
      transition: border-color .15s, background .15s;
    }

    .chip:hover { border-color: var(--copilot); background: var(--surface); }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--copilot);
      border-radius: 50%;
      animation: bounce .8s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: .15s; }
    .typing-indicator span:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ─────────────────────────────────────────────────────── */
    .input-area {
      padding: 10px 14px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 12px;
      resize: none;
      outline: none;
      max-height: 140px;
      transition: border-color .15s;
    }

    .input-box:focus { border-color: var(--copilot); }
    .input-box::placeholder { color: var(--text-muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      width: 36px;
      flex-shrink: 0;
      transition: background .15s, opacity .15s;
    }

    .send-btn:hover:not(:disabled) { background: var(--accent-h); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
      padding-left: 2px;
    }

    /* ── Toast notifications ─────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 80px;
      right: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      padding: 8px 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      animation: fadeInUp .3s ease;
      max-width: 280px;
    }

    .toast.success { border-left: 3px solid #3fb950; }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--copilot); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    .toast.hide { animation: fadeOut .3s ease forwards; }
  </style>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="oscar-logo">
    <!-- Copilot-inspired icon -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="11" stroke="#58a6ff" stroke-width="1.5"/>
      <path d="M8 9.5C8 8.12 9.12 7 10.5 7h3C14.88 7 16 8.12 16 9.5v1C16 11.88 14.88 13 13.5 13h-3C9.12 13 8 11.88 8 10.5V9.5Z" fill="#58a6ff" opacity=".4"/>
      <circle cx="10.5" cy="9.8" r="1" fill="#58a6ff"/>
      <circle cx="13.5" cy="9.8" r="1" fill="#58a6ff"/>
      <path d="M9 13.5c0 1.5 1 3 3 3s3-1.5 3-3" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    OSCAR
  </div>
  <span style="font-size:12px;color:var(--text-muted);flex-shrink:0;">Onshape AI Bridge</span>

  <div class="topbar-sep"></div>

  <!-- Agent / model picker -->
  <div class="agent-picker-wrap" id="agentPickerWrap">
    <button class="agent-picker-btn" id="agentPickerBtn" aria-haspopup="listbox" aria-expanded="false">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" style="flex-shrink:0;opacity:.7">
        <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0Zm.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588ZM8 5.5a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/>
      </svg>
      <span class="agent-name" id="selectedAgentName">Loading…</span>
      <span class="provider-badge copilot" id="selectedProviderBadge">Copilot</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/>
      </svg>
    </button>

    <div class="agent-dropdown" id="agentDropdown" role="listbox">
      <div class="dropdown-header">Select AI model</div>
      <div id="agentList"><!-- populated by JS --></div>
      <div class="dropdown-footer">
        🎓 Students: GitHub Copilot is
        <a href="https://education.github.com/students" target="_blank" rel="noopener noreferrer">free via GitHub Education</a>
      </div>
    </div>
  </div>
</header>

<!-- ── Onshape context bar ──────────────────────────────────────────────── -->
<div class="context-bar">
  <span class="ctx-label">Onshape&nbsp;context:</span>
  <div class="ctx-field">
    <label for="inputOnshapeUrl" style="flex-shrink:0">URL</label>
    <input
      class="ctx-input ctx-input-url"
      id="inputOnshapeUrl"
      placeholder="https://cad.onshape.com/documents/.../w/.../e/..."
      autocomplete="off"
      spellcheck="false"
    />
  </div>
  <span style="font-size:11px;color:var(--text-muted)">or manual IDs:</span>
  <div class="ctx-field">
    <label for="inputDid" style="flex-shrink:0">Document</label>
    <input class="ctx-input" id="inputDid" placeholder="documentId" autocomplete="off" spellcheck="false" />
  </div>
  <div class="ctx-field">
    <label for="inputWid" style="flex-shrink:0">Workspace</label>
    <input class="ctx-input" id="inputWid" placeholder="workspaceId" autocomplete="off" spellcheck="false" />
  </div>
  <div class="ctx-field">
    <label for="inputEid" style="flex-shrink:0">Element</label>
    <input class="ctx-input" id="inputEid" placeholder="elementId" autocomplete="off" spellcheck="false" />
  </div>
  <button class="ctx-fetch-btn" id="fetchCtxBtn" title="Load feature tree from Onshape">Load context</button>
  <span class="ctx-status" id="ctxStatus" style="display:none"></span>
</div>

<!-- ── Message list ────────────────────────────────────────────────────── -->
<main class="messages" id="messageList">
  <div class="empty-state" id="emptyState">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="11" stroke="#58a6ff" stroke-width="1.2"/>
      <path d="M8 9.5C8 8.12 9.12 7 10.5 7h3C14.88 7 16 8.12 16 9.5v1C16 11.88 14.88 13 13.5 13h-3C9.12 13 8 11.88 8 10.5V9.5Z" fill="#58a6ff" opacity=".3"/>
      <circle cx="10.5" cy="9.8" r="1" fill="#58a6ff"/>
      <circle cx="13.5" cy="9.8" r="1" fill="#58a6ff"/>
      <path d="M9 13.5c0 1.5 1 3 3 3s3-1.5 3-3" stroke="#58a6ff" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <h2>Ask OSCAR anything</h2>
    <p>Select a model above, then type a question or pick a suggestion to get started.</p>
    <div class="suggestion-chips" id="suggestionChips">
      <button class="chip">Explain this feature tree</button>
      <button class="chip">Suggest parametric improvements</button>
      <button class="chip">Generate a FeatureScript extrude</button>
      <button class="chip">Review for design issues</button>
      <button class="chip">Write assembly documentation</button>
    </div>
  </div>
</main>

<!-- ── Input area ─────────────────────────────────────────────────────── -->
<footer class="input-area">
  <div class="input-row">
    <textarea
      class="input-box"
      id="messageInput"
      rows="1"
      placeholder="Ask GitHub Copilot about your Onshape design…"
      aria-label="Message input"
    ></textarea>
    <button class="send-btn" id="sendBtn" title="Send (Enter)" aria-label="Send message" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.495 12.026l-2.82-4.437-2.495 6.24 2.81.332 2.505-2.135Zm4.46-4.11-5.498-3.3 6.24-2.495-3.3 5.497-.44-.702Z"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">
    <kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:10px">Enter</kbd> to send &nbsp;·&nbsp;
    <kbd style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:10px">Shift+Enter</kbd> for newline
  </p>
</footer>

<!-- ── Toast container ────────────────────────────────────────────────── -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// OSCAR Frontend — Onshape ↔ GitHub Copilot bridge
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// Backend base URL — set window.OSCAR_API_URL before this script to override
const API_BASE = (window.OSCAR_API_URL || 'http://localhost:3000').replace(/\/$/, '');

// ── State ─────────────────────────────────────────────────────────────────
let allAgents     = [];
let selectedAgent = null;
let messages      = [];          // { role, content }[]
let isLoading     = false;
let onshapeCtx    = null;        // { documentId, workspaceId, elementId } | null

// ── DOM refs ──────────────────────────────────────────────────────────────
const agentPickerBtn    = document.getElementById('agentPickerBtn');
const agentPickerWrap   = document.getElementById('agentPickerWrap');
const agentDropdown     = document.getElementById('agentDropdown');
const agentList         = document.getElementById('agentList');
const selectedAgentName = document.getElementById('selectedAgentName');
const selectedBadge     = document.getElementById('selectedProviderBadge');
const messageList       = document.getElementById('messageList');
const emptyState        = document.getElementById('emptyState');
const messageInput      = document.getElementById('messageInput');
const sendBtn           = document.getElementById('sendBtn');
const suggestionChips   = document.getElementById('suggestionChips');
const fetchCtxBtn       = document.getElementById('fetchCtxBtn');
const ctxStatus         = document.getElementById('ctxStatus');
const toastContainer    = document.getElementById('toastContainer');
const inputOnshapeUrl   = document.getElementById('inputOnshapeUrl');
const inputDid          = document.getElementById('inputDid');
const inputWid          = document.getElementById('inputWid');
const inputEid          = document.getElementById('inputEid');

const onshapeIdRegex = /^[a-f0-9]{24}$/i;
const onshapeContextSegmentCount = 6; // documents,did,w,wid,e,eid

function parseOnshapeUrl(rawUrl) {
  let parsed;
  try {
    parsed = new URL(rawUrl);
  } catch {
    throw new Error('Invalid URL format. Paste a valid Onshape document URL (for example https://cad.onshape.com/documents/...).');
  }

  if (!/(^|\.)onshape\.com$/i.test(parsed.hostname)) {
    throw new Error('URL must be on an Onshape domain (for example cad.onshape.com).');
  }

  const parts = parsed.pathname.split('/').filter(Boolean);
  const docIdx = parts.indexOf('documents');
  if (docIdx === -1 || parts.length < docIdx + onshapeContextSegmentCount) {
    throw new Error('URL must include /documents/{did}/w/{wid}/e/{eid}.');
  }

  const documentId = parts[docIdx + 1];
  const branchType = parts[docIdx + 2];
  const workspaceId = parts[docIdx + 3];
  const elementMarker = parts[docIdx + 4];
  const elementId = parts[docIdx + 5];

  if (branchType !== 'w') {
    throw new Error('Use a workspace link (/w/...) so OSCAR can apply edits.');
  }

  if (elementMarker !== 'e') {
    throw new Error('URL must include an element segment (/e/{elementId}).');
  }

  if (
    !onshapeIdRegex.test(documentId) ||
    !onshapeIdRegex.test(workspaceId) ||
    !onshapeIdRegex.test(elementId)
  ) {
    throw new Error('Onshape IDs must be 24-character hexadecimal values.');
  }

  return { documentId, workspaceId, elementId };
}

function resolveOnshapeContextInputs() {
  const rawUrl = inputOnshapeUrl.value.trim();
  if (rawUrl) {
    return parseOnshapeUrl(rawUrl);
  }

  const documentId = inputDid.value.trim();
  const workspaceId = inputWid.value.trim();
  const elementId = inputEid.value.trim();

  if (!documentId || !workspaceId || !elementId) {
    throw new Error('Paste an Onshape URL, or enter Document, Workspace, and Element IDs.');
  }

  if (
    !onshapeIdRegex.test(documentId) ||
    !onshapeIdRegex.test(workspaceId) ||
    !onshapeIdRegex.test(elementId)
  ) {
    throw new Error('Document, Workspace, and Element IDs must be 24-character hexadecimal values.');
  }

  return { documentId, workspaceId, elementId };
}

// ── Toast helper ──────────────────────────────────────────────────────────
function showToast(text, type = 'info', duration = 4000) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = text;
  toastContainer.appendChild(t);
  setTimeout(() => {
    t.classList.add('hide');
    setTimeout(() => t.remove(), 400);
  }, duration);
}

// ── Provider badge class ──────────────────────────────────────────────────
function providerBadgeClass(providerId) {
  if (providerId === 'github-copilot') return 'copilot';
  if (providerId === 'openai')         return 'openai';
  if (providerId === 'anthropic')      return 'anthropic';
  return '';
}

function providerBadgeLabel(providerId) {
  if (providerId === 'github-copilot') return 'Copilot';
  if (providerId === 'openai')         return 'OpenAI';
  if (providerId === 'anthropic')      return 'Anthropic';
  return providerId;
}

// ── Load agents from backend ──────────────────────────────────────────────
async function loadAgents() {
  try {
    const res  = await fetch(`${API_BASE}/api/agents`);
    const data = await res.json();

    allAgents = data.agents || [];

    // Default: first GitHub Copilot agent
    const defaultAgent = allAgents.find(a => a.provider === 'github-copilot') || allAgents[0];
    selectAgent(defaultAgent, false);

    renderAgentDropdown(data.providers || []);
  } catch (err) {
    selectedAgentName.textContent = 'No agents loaded';
    showToast('Could not reach OSCAR backend. Is the server running?', 'error', 8000);
  }
}

// ── Render agent dropdown ─────────────────────────────────────────────────
function renderAgentDropdown(providers) {
  agentList.innerHTML = '';

  for (const provider of providers) {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'provider-group';

    const labelDiv = document.createElement('div');
    labelDiv.className = 'provider-label';
    labelDiv.textContent = provider.name;
    groupDiv.appendChild(labelDiv);

    for (const agent of provider.agents) {
      const opt = document.createElement('div');
      opt.className = 'agent-option' + (selectedAgent?.id === agent.id ? ' selected' : '');
      opt.role = 'option';
      opt.dataset.agentId = agent.id;
      opt.innerHTML = `
        <svg class="check-icon ${selectedAgent?.id === agent.id ? '' : 'hidden'}"
             width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M13.854 3.646a.5.5 0 0 1 0 .708l-7 7a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L6.5 10.293l6.646-6.647a.5.5 0 0 1 .708 0z"/>
        </svg>
        <div class="agent-option-info">
          <div class="agent-option-name">${escHtml(agent.name)}</div>
          <div class="agent-option-desc">${escHtml(agent.description)}</div>
        </div>
        <span class="provider-badge ${providerBadgeClass(agent.provider)}">
          ${escHtml(providerBadgeLabel(agent.provider))}
        </span>
      `;
      opt.addEventListener('click', () => {
        selectAgent(agent);
        closeDropdown();
      });
      groupDiv.appendChild(opt);
    }

    agentList.appendChild(groupDiv);
  }
}

function selectAgent(agent, rerender = true) {
  if (!agent) return;
  selectedAgent = agent;
  selectedAgentName.textContent = agent.name;
  selectedBadge.textContent     = providerBadgeLabel(agent.provider);
  selectedBadge.className       = `provider-badge ${providerBadgeClass(agent.provider)}`;

  // Update send-button enabled state
  updateSendBtn();

  if (rerender) {
    // Refresh check marks
    document.querySelectorAll('.agent-option').forEach(el => {
      const isThis = el.dataset.agentId === agent.id;
      el.classList.toggle('selected', isThis);
      el.querySelector('.check-icon')?.classList.toggle('hidden', !isThis);
    });
  }
}

// ── Dropdown open/close ───────────────────────────────────────────────────
function openDropdown() {
  agentDropdown.classList.add('open');
  agentPickerBtn.classList.add('open');
  agentPickerBtn.setAttribute('aria-expanded', 'true');
}

function closeDropdown() {
  agentDropdown.classList.remove('open');
  agentPickerBtn.classList.remove('open');
  agentPickerBtn.setAttribute('aria-expanded', 'false');
}

agentPickerBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  agentDropdown.classList.contains('open') ? closeDropdown() : openDropdown();
});

document.addEventListener('click', (e) => {
  if (!agentPickerWrap.contains(e.target)) closeDropdown();
});

// ── Load Onshape context ──────────────────────────────────────────────────
fetchCtxBtn.addEventListener('click', async () => {
  let ctx;
  try {
    ctx = resolveOnshapeContextInputs();
    inputDid.value = ctx.documentId;
    inputWid.value = ctx.workspaceId;
    inputEid.value = ctx.elementId;
  } catch (err) {
    const msg = err instanceof Error ? err.message : 'Invalid Onshape context input.';
    setCtxStatus('err', `✗ ${msg}`);
    showToast(msg, 'error');
    return;
  }

  setCtxStatus('loading', 'Fetching…');
  fetchCtxBtn.disabled = true;

  try {
    const { documentId: did, workspaceId: wid, elementId: eid } = ctx;
    const url = `${API_BASE}/api/onshape/context?did=${encodeURIComponent(did)}&wid=${encodeURIComponent(wid)}&eid=${encodeURIComponent(eid)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Unknown error');

    onshapeCtx = { documentId: did, workspaceId: wid, elementId: eid };
    const docName = data.document?.name || did;
    setCtxStatus('ok', `✓ ${docName}`);
    showToast(`Loaded context for "${docName}"`, 'success');
  } catch (err) {
    setCtxStatus('err', `✗ ${err.message}`);
    showToast(`Could not load Onshape context: ${err.message}`, 'error');
  } finally {
    fetchCtxBtn.disabled = false;
  }
});

function setCtxStatus(type, text) {
  ctxStatus.style.display = '';
  ctxStatus.className = `ctx-status ${type}`;
  ctxStatus.textContent = text;
}

// ── Suggestion chips ──────────────────────────────────────────────────────
suggestionChips.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    messageInput.value = chip.textContent.trim();
    messageInput.dispatchEvent(new Event('input'));
    messageInput.focus();
  });
});

// ── Message rendering ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** Minimal markdown-like renderer for AI responses. */
function renderMarkdown(text) {
  // 1. Extract fenced code blocks and escape their contents.
  //    Replace with null-byte-delimited placeholders (null bytes survive
  //    escHtml since only &, <, >, " are escaped).
  const blocks = [];
  let out = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_m, lang, code) => {
    const idx = blocks.length;
    blocks.push(`<pre><code class="lang-${escHtml(lang)}">${escHtml(code.trimEnd())}</code></pre>`);
    return `\x00BLOCK${idx}\x00`;
  });

  // 2. Escape ALL remaining text to neutralise any raw HTML from the AI.
  //    Asterisks, backticks, and hash marks are not touched by escHtml,
  //    so markdown patterns still match on the escaped output.
  out = escHtml(out);

  // 3. Inline code — content is already HTML-escaped; just wrap it.
  out = out.replace(/`([^`]+)`/g, (_m, code) => `<code>${code}</code>`);

  // 4. Bold (content pre-escaped by step 2)
  out = out.replace(/\*\*([\s\S]+?)\*\*/g, (_m, match) => `<strong>${match}</strong>`);
  // 5. Italic — only single asterisks not adjacent to another asterisk
  out = out.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, (_m, match) => `<em>${match}</em>`);

  // 6. Headers (content pre-escaped)
  out = out.replace(/^#{3} (.+)$/gm, (_m, match) => `<strong>${match}</strong>`);
  out = out.replace(/^#{1,2} (.+)$/gm, (_m, match) => `<strong style="font-size:1.05em">${match}</strong>`);

  // 7. Unordered lists (content pre-escaped)
  out = out.replace(/^[ \t]*[-*•] (.+)$/gm, (_m, match) => `• ${match}`);

  // 8. Restore code block placeholders.
  out = out.replace(/\x00BLOCK(\d+)\x00/g, (_m, i) => blocks[Number(i)]);

  return out;
}

function appendMessage(role, content, actions) {
  emptyState.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = `message ${role === 'user' ? 'user' : 'ai'}`;

  const avatarLetter = role === 'user' ? 'U' : '✦';
  const senderLabel  = role === 'user' ? 'You' : (selectedAgent?.name || 'OSCAR');

  wrap.innerHTML = `
    <div class="message-header">
      <div class="avatar ${role === 'user' ? 'user' : 'ai'}" aria-hidden="true">${escHtml(avatarLetter)}</div>
      <span>${escHtml(senderLabel)}</span>
    </div>
    <div class="message-body">${role === 'user' ? escHtml(content) : renderMarkdown(content)}</div>
  `;

  // Action buttons (for AI messages)
  if (actions && actions.length > 0) {
    const actionList = document.createElement('div');
    actionList.className = 'action-list';

    actions.forEach((action, idx) => {
      const item = document.createElement('div');
      item.className = 'action-item';
      item.innerHTML = `
        <span class="action-type-badge">${escHtml(action.type)}</span>
        <span class="action-label">${escHtml(action.label || 'Apply action')}</span>
        <button class="apply-btn" data-action-idx="${idx}">Apply to Onshape</button>
      `;
      item.querySelector('.apply-btn').addEventListener('click', (e) => {
        applyAction(action, e.currentTarget);
      });
      actionList.appendChild(item);
    });

    wrap.appendChild(actionList);
  }

  messageList.appendChild(wrap);
  messageList.scrollTop = messageList.scrollHeight;
  return wrap;
}

function appendTypingIndicator() {
  emptyState.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'message ai';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `
    <div class="message-header">
      <div class="avatar ai" aria-hidden="true">✦</div>
      <span>${escHtml(selectedAgent?.name || 'OSCAR')}</span>
    </div>
    <div class="message-body">
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>
    </div>
  `;
  messageList.appendChild(wrap);
  messageList.scrollTop = messageList.scrollHeight;
  return wrap;
}

// ── Apply action to Onshape ───────────────────────────────────────────────
async function applyAction(action, btn) {
  if (!onshapeCtx) {
    showToast('Load an Onshape context first (paste a URL or enter IDs, then click "Load context").', 'error', 5000);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Applying…';

  try {
    const res  = await fetch(`${API_BASE}/api/onshape/apply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ onshapeContext: onshapeCtx, action }),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Unknown error');

    btn.classList.add('applied');
    btn.textContent = '✓ Applied';
    showToast(`Action "${action.label}" applied successfully!`, 'success');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Apply to Onshape';
    showToast(`Failed to apply action: ${err.message}`, 'error');
  }
}

// ── Send message ──────────────────────────────────────────────────────────
async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || isLoading || !selectedAgent) return;

  isLoading = true;
  updateSendBtn();

  // Add to local history
  messages.push({ role: 'user', content: text });
  appendMessage('user', text);

  messageInput.value = '';
  messageInput.style.height = 'auto';

  const typingEl = appendTypingIndicator();

  try {
    const res  = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        agentId: selectedAgent.id,
        messages,
        onshapeContext: onshapeCtx,
      }),
    });

    const data = await res.json();
    typingEl.remove();

    if (!res.ok) {
      const errText = data.error || `HTTP ${res.status}`;
      messages.push({ role: 'assistant', content: `Error: ${errText}` });
      appendMessage('assistant', `⚠️ Error: ${errText}`);
      showToast(errText, 'error');
    } else {
      messages.push(data.message);
      appendMessage('assistant', data.message.content, data.actions);
    }
  } catch (err) {
    typingEl.remove();
    const errText = `Network error: ${err.message}`;
    messages.push({ role: 'assistant', content: errText });
    appendMessage('assistant', `⚠️ ${errText}`);
    showToast('Could not reach OSCAR backend.', 'error');
  } finally {
    isLoading = false;
    updateSendBtn();
    messageInput.focus();
  }
}

// ── Input helpers ─────────────────────────────────────────────────────────
function updateSendBtn() {
  sendBtn.disabled = isLoading || !messageInput.value.trim() || !selectedAgent;
}

messageInput.addEventListener('input', () => {
  // Auto-resize textarea
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 140) + 'px';
  updateSendBtn();
});

messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// ── Init ──────────────────────────────────────────────────────────────────
loadAgents();
</script>
